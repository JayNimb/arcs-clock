<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arcs Ur">
<title>Arcs · Ur</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #090806; --parchment: #e4d0a8; --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,.15); --gold-line: rgba(201,168,76,.18);
  --ember: #bf4f28; --ash: #635a50; --ash2: #857a6e;
  --p0:#c0522a; --p1:#4a7fa5; --p2:#7a9e4a; --p3:#9a5ca8;
}
html,body { height:100%; width:100%; background:var(--bg); color:var(--parchment); font-family:'Crimson Pro',serif; overflow:hidden; -webkit-text-size-adjust:100%; touch-action:manipulation; }
.screen { display:none; height:100%; width:100%; flex-direction:column; }
.screen.active { display:flex; }

/* MODE SELECT */
#s-mode { align-items:center; justify-content:center; gap:1.8rem; padding:2rem; background:radial-gradient(ellipse at 50% 30%,#1c140a 0%,var(--bg) 70%); }
#s-mode .logo { margin-bottom:.5rem; }
.mode-cards { display:flex; flex-direction:column; gap:1rem; width:100%; max-width:380px; }
.mode-card { padding:1.6rem 1.4rem; background:rgba(255,255,255,.03); border:1px solid var(--gold-line); border-radius:10px; cursor:pointer; transition:all .2s; -webkit-tap-highlight-color:transparent; text-align:left; width:100%; }
.mode-card:active { transform:scale(.98); }
.mode-card:hover { background:rgba(255,255,255,.05); border-color:var(--gold); }
.mode-card-title { font-family:'Cinzel',serif; font-size:1rem; font-weight:700; letter-spacing:.12em; color:var(--gold); margin-bottom:.4rem; }
.mode-card-desc { font-style:italic; color:var(--ash2); font-size:.9rem; line-height:1.5; }
.mode-icon { font-size:1.6rem; margin-bottom:.6rem; }

/* SETUP */
#s-setup { align-items:center; justify-content:flex-start; overflow-y:auto; padding:2.5rem 1.5rem 3rem; background:radial-gradient(ellipse at 50% 0%,#1c140a 0%,var(--bg) 65%); }
.logo { text-align:center; margin-bottom:2.5rem; }
.logo h1 { font-family:'Cinzel',serif; font-weight:900; font-size:clamp(2.2rem,10vw,3.8rem); letter-spacing:.16em; color:var(--gold); text-shadow:0 0 50px rgba(201,168,76,.35); }
.logo p { font-style:italic; color:var(--ash2); font-size:1rem; letter-spacing:.08em; margin-top:.2em; }
.card { width:100%; max-width:460px; background:rgba(255,255,255,.03); border:1px solid var(--gold-line); border-radius:8px; padding:1.4rem 1.4rem 1.6rem; margin-bottom:1rem; }
.card-label { font-family:'Cinzel',serif; font-size:.68rem; letter-spacing:.22em; color:var(--gold); text-transform:uppercase; margin-bottom:1rem; }
.row-btns { display:flex; gap:.5rem; }
.opt-btn { flex:1; padding:.75rem .4rem; background:transparent; border:1px solid rgba(255,255,255,.08); border-radius:5px; color:var(--ash2); font-family:'Cinzel',serif; font-size:.9rem; cursor:pointer; transition:all .18s; -webkit-tap-highlight-color:transparent; }
.opt-btn.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }
.time-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.5rem; }
.time-grid .opt-btn { font-size:.85rem; padding:.7rem .2rem; }
.custom-row { display:flex; gap:.6rem; align-items:center; margin-top:.6rem; }
.custom-row input { flex:1; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:5px; color:var(--parchment); font-family:'Crimson Pro',serif; font-size:1rem; padding:.6rem .9rem; outline:none; }
.custom-row input:focus { border-color:var(--gold); }
.custom-row input::placeholder { color:var(--ash); }
.custom-row span { color:var(--ash2); font-size:.9rem; white-space:nowrap; }
.name-list { display:flex; flex-direction:column; gap:.5rem; }
.name-row { display:flex; align-items:center; gap:.7rem; }
.name-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.name-input { flex:1; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:5px; color:var(--parchment); font-family:'Crimson Pro',serif; font-size:1rem; padding:.6rem 1rem; outline:none; }
.name-input:focus { border-color:var(--gold); }
.main-btn { width:100%; max-width:460px; padding:1.1rem; border:none; border-radius:6px; font-family:'Cinzel',serif; font-size:.95rem; font-weight:700; letter-spacing:.18em; cursor:pointer; transition:all .18s; -webkit-tap-highlight-color:transparent; margin-top:.5rem; }
.main-btn.primary { background:var(--gold); color:#0a0806; box-shadow:0 4px 28px rgba(201,168,76,.28); }
.main-btn.secondary { background:transparent; border:1px solid var(--gold-line); color:var(--gold); }
.main-btn:active { transform:scale(.98); }

/* JOIN */
#s-join { align-items:center; justify-content:center; padding:2rem; gap:1.2rem; background:radial-gradient(ellipse at 50% 30%,#1c140a,var(--bg) 70%); }
#s-join h2 { font-family:'Cinzel',serif; font-size:clamp(1.4rem,6vw,2rem); color:var(--gold); letter-spacing:.12em; }
.join-desc { color:var(--ash2); font-style:italic; font-size:1rem; text-align:center; max-width:280px; }
.join-input-row { display:flex; width:100%; max-width:340px; }
.join-input { flex:1; background:rgba(255,255,255,.05); border:1px solid var(--gold-line); border-radius:5px; color:var(--parchment); font-family:'Cinzel',serif; font-size:1.8rem; font-weight:700; letter-spacing:.3em; padding:.7rem 1rem; outline:none; text-align:center; text-transform:uppercase; width:100%; }
.join-input:focus { border-color:var(--gold); }
.join-action-row { display:flex; gap:.6rem; width:100%; max-width:340px; }
.join-btn { flex:1; padding:.9rem; background:var(--gold); color:var(--bg); border:none; border-radius:5px; font-family:'Cinzel',serif; font-size:.85rem; font-weight:700; letter-spacing:.12em; cursor:pointer; }
.join-back-btn { padding:.9rem 1rem; background:transparent; border:1px solid rgba(255,255,255,.1); border-radius:5px; color:var(--ash2); font-family:'Cinzel',serif; font-size:.75rem; letter-spacing:.1em; cursor:pointer; white-space:nowrap; }
.divider { display:flex; align-items:center; gap:1rem; width:100%; max-width:340px; color:var(--ash); font-size:.8rem; letter-spacing:.1em; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--gold-line); }

/* LOBBY */
#s-lobby { align-items:center; justify-content:center; padding:2rem; gap:1rem; background:radial-gradient(ellipse at 50% 30%,#1c140a,var(--bg) 70%); }
#s-lobby h2 { font-family:'Cinzel',serif; font-size:1.2rem; color:var(--gold); letter-spacing:.15em; }
.lobby-code { font-family:'Cinzel',serif; font-size:clamp(3rem,16vw,6rem); font-weight:900; letter-spacing:.35em; color:var(--parchment); text-shadow:0 0 40px rgba(228,208,168,.15); }
.lobby-hint { color:var(--ash2); font-style:italic; font-size:.95rem; text-align:center; }
.player-list { width:100%; max-width:360px; display:flex; flex-direction:column; gap:.5rem; }
.player-pill { display:flex; align-items:center; gap:.8rem; padding:.8rem 1rem; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); border-radius:6px; font-family:'Cinzel',serif; font-size:.85rem; letter-spacing:.08em; }
.player-pill.me { border-color:var(--gold-line); }
.pill-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.pill-name { flex:1; }
.pill-badge { font-size:.65rem; letter-spacing:.1em; color:var(--ash); background:rgba(255,255,255,.06); padding:.2rem .5rem; border-radius:3px; }
.lobby-start-btn { width:100%; max-width:360px; padding:1rem; background:var(--gold); color:var(--bg); border:none; border-radius:6px; font-family:'Cinzel',serif; font-size:.9rem; font-weight:700; letter-spacing:.15em; cursor:pointer; box-shadow:0 4px 24px rgba(201,168,76,.25); -webkit-tap-highlight-color:transparent; }
.lobby-start-btn:disabled { opacity:.4; cursor:default; }

/* CLOCK */
#s-clock { position:relative; }
#tiles { flex:1; display:grid; overflow:hidden; }
.tile { position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; transition:background .25s; border-bottom:1px solid rgba(0,0,0,.4); overflow:hidden; }
.tile:last-child { border-bottom:none; }
.tile::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 50%,var(--pc) 0%,transparent 70%); opacity:0; transition:opacity .4s; pointer-events:none; }
.tile.active::after { opacity:.07; }
.tile::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--pc); opacity:0; transition:opacity .3s; }
.tile.active::before { opacity:1; }
.tile-name { font-family:'Cinzel',serif; font-size:clamp(.65rem,2.2vw,.95rem); letter-spacing:.2em; color:var(--ash2); margin-bottom:.35em; transition:color .3s; }
.tile.active .tile-name { color:var(--pc); }
.tile-time { font-family:'Cinzel',serif; font-weight:700; font-size:clamp(2.2rem,11vw,5rem); letter-spacing:.04em; line-height:1; color:var(--parchment); transition:color .3s,text-shadow .3s; }
.tile.active .tile-time { color:#fff; text-shadow:0 0 35px var(--pc); }
.tile.warning .tile-time { color:var(--ember); animation:blink 1.1s ease-in-out infinite; }
.tile.expired .tile-time { color:var(--ember); opacity:.5; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.tile-sub { font-size:clamp(.6rem,1.8vw,.8rem); letter-spacing:.1em; color:var(--ash); margin-top:.4em; font-style:italic; min-height:1.2em; transition:color .3s; }
.tile.active .tile-sub { color:var(--pc); }
.my-ring { position:absolute; inset:6px; border:2px solid var(--pc); border-radius:4px; opacity:0; transition:opacity .3s; pointer-events:none; }
.tile.is-me.active .my-ring { opacity:.35; }

/* BAR */
#bar { display:flex; align-items:center; justify-content:space-between; padding:.5rem .8rem; border-top:1px solid var(--gold-line); background:rgba(9,8,6,.95); flex-shrink:0; gap:.5rem; min-height:68px; }
.b-btn { background:transparent; border:1px solid rgba(255,255,255,.1); border-radius:5px; color:var(--ash2); font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.12em; padding:.5rem .75rem; cursor:pointer; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
#pause-btn { padding:.85rem 2rem; font-size:.8rem; letter-spacing:.16em; border-color:var(--gold); color:var(--gold); border-width:1.5px; font-weight:700; box-shadow:0 0 16px rgba(201,168,76,.1); }
#pause-btn.paused { background:var(--gold-dim); box-shadow:0 0 20px rgba(201,168,76,.2); }
.bar-center { flex:1; text-align:center; font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.14em; color:var(--ash); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#pause-banner { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'Cinzel',serif; font-size:clamp(1.2rem,5vw,2rem); letter-spacing:.35em; color:var(--gold); opacity:.45; pointer-events:none; z-index:40; }
#pause-banner.show { display:block; }

/* OVERLAY */
#overlay { display:none; position:fixed; inset:0; background:rgba(9,8,6,.9); z-index:80; flex-direction:column; align-items:center; justify-content:center; gap:1.2rem; padding:2rem; text-align:center; }
#overlay.show { display:flex; }
#overlay h2 { font-family:'Cinzel',serif; font-size:clamp(1.4rem,6vw,2.2rem); color:var(--gold); letter-spacing:.1em; }
#overlay p { color:var(--ash2); font-style:italic; max-width:300px; font-size:1.05rem; }
.ov-btns { display:flex; gap:.8rem; flex-wrap:wrap; justify-content:center; }
.ov-btn { padding:.8rem 1.8rem; border:1px solid rgba(255,255,255,.1); background:transparent; color:var(--parchment); font-family:'Cinzel',serif; font-size:.75rem; letter-spacing:.12em; border-radius:5px; cursor:pointer; }
.ov-btn.primary { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }

/* TOAST */
#toast { position:fixed; bottom:72px; left:50%; transform:translateX(-50%); background:rgba(30,24,16,.95); border:1px solid var(--gold-line); border-radius:20px; padding:.5rem 1.2rem; font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.12em; color:var(--parchment); opacity:0; pointer-events:none; transition:opacity .3s; z-index:90; white-space:nowrap; }
#toast.show { opacity:1; }
.conn-dot { width:6px; height:6px; border-radius:50%; background:var(--ash); flex-shrink:0; transition:background .5s; }
.conn-dot.on { background:#7a9e4a; }
.conn-dot.warn { background:var(--ember); }
</style>
</head>
<body>

<!-- MODE SELECT -->
<div id="s-mode" class="screen active">
  <div class="logo"><h1>ARCS</h1><p>Tur-ur</p></div>
  <div class="mode-cards">
    <button class="mode-card" onclick="goLocal()">
      <div class="mode-icon">📱</div>
      <div class="mode-card-title">ÉN TELEFON</div>
      <div class="mode-card-desc">Alle spillere deler én skærm. Ingen internet nødvendigt.</div>
    </button>
    <button class="mode-card" onclick="goNetwork()">
      <div class="mode-icon">📡</div>
      <div class="mode-card-title">NETVÆRK</div>
      <div class="mode-card-desc">Hver spiller har sin egen telefon. Synkroniseret via internet.</div>
    </button>
  </div>
</div>

<!-- SETUP (bruges af begge modes) -->
<div id="s-setup" class="screen">
  <div class="logo"><h1>ARCS</h1><p id="setup-subtitle">Tur-ur</p></div>
  <div class="card">
    <div class="card-label">Antal spillere</div>
    <div class="row-btns" id="cnt-btns">
      <button class="opt-btn" data-n="2" onclick="setCnt(2)">2</button>
      <button class="opt-btn active" data-n="3" onclick="setCnt(3)">3</button>
      <button class="opt-btn" data-n="4" onclick="setCnt(4)">4</button>
    </div>
  </div>
  <div class="card">
    <div class="card-label">Tid pr. spiller</div>
    <div class="time-grid" id="time-btns">
      <button class="opt-btn" data-m="10" onclick="setTime(10)">10 min</button>
      <button class="opt-btn" data-m="15" onclick="setTime(15)">15 min</button>
      <button class="opt-btn active" data-m="20" onclick="setTime(20)">20 min</button>
      <button class="opt-btn" data-m="30" onclick="setTime(30)">30 min</button>
      <button class="opt-btn" data-m="45" onclick="setTime(45)">45 min</button>
      <button class="opt-btn" data-m="60" onclick="setTime(60)">60 min</button>
    </div>
    <div class="custom-row">
      <input type="number" id="custom-min" placeholder="Anden tid" min="1" max="999" oninput="setCustomTime(this.value)">
      <span>min</span>
    </div>
  </div>
  <div class="card">
    <div class="card-label">Spillernavne</div>
    <div class="name-list" id="name-list"></div>
  </div>
  <div id="setup-btns"></div>
  <div style="height:2rem"></div>
</div>

<!-- JOIN -->
<div id="s-join" class="screen">
  <h2>DELTAG</h2>
  <p class="join-desc">Indtast den 4-bogstavs kode fra host-telefonen</p>
  <div class="join-input-row">
    <input class="join-input" id="join-code-input" maxlength="4" placeholder="KODE" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="join-action-row">
    <button class="join-back-btn" onclick="showSetup()">← Tilbage</button>
    <button class="join-btn" onclick="joinGame()">DELTAG →</button>
  </div>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen">
  <h2>VENTER PÅ SPILLERE</h2>
  <div class="lobby-code" id="lobby-code">----</div>
  <p class="lobby-hint">Andre spillere indtaster denne kode</p>
  <div class="player-list" id="lobby-players"></div>
  <button class="lobby-start-btn" id="lobby-start-btn" onclick="launchGame()" disabled>START SPILLET</button>
  <div style="height:.5rem"></div>
  <button class="opt-btn" style="width:100%;max-width:360px;margin-top:.3rem" onclick="leaveGame()">Forlad lobby</button>
</div>

<!-- CLOCK -->
<div id="s-clock" class="screen">
  <div id="tiles"></div>
  <div id="bar">
    <button class="b-btn" onclick="showResetOverlay()">↺ Ny</button>
    <button id="pause-btn" class="b-btn" onclick="doPause()">⏸ PAUSE</button>
    <div class="bar-center" id="bar-center"></div>
    <div class="conn-dot" id="conn-dot"></div>
  </div>
</div>

<div id="pause-banner">PAUSE</div>
<div id="overlay">
  <h2 id="ov-title"></h2><p id="ov-msg"></p>
  <div class="ov-btns" id="ov-btns"></div>
</div>
<div id="toast"></div>

<!-- Firebase compat SDK — works locally in Safari (no ES modules needed) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAypkzUBwOp-EZZMiSpGPQFLjHWyWygIfQ",
  authDomain: "arcs-clock.firebaseapp.com",
  projectId: "arcs-clock",
  storageBucket: "arcs-clock.firebasestorage.app",
  messagingSenderId: "212995008497",
  appId: "1:212995008497:web:ed3405c103bdb6e9d50650",
  databaseURL: "https://arcs-clock-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = firebase.database();

const COLORS    = ['#c0522a','#4a7fa5','#7a9e4a','#9a5ca8'];
const DEF_NAMES = ['Spiller 1','Spiller 2','Spiller 3','Spiller 4'];
const $         = id => document.getElementById(id);

let cfg = { cnt:3, secs:20*60 };
let me  = { code:null, idx:-1, isHost:false };
let gameRef=null, gameListener=null;
let localTimers=[], tickInterval=null, lastTickMs=null;
let gs=null, prevActive=-2;
let gameMode=''; // 'local' or 'network'

// ── Helpers ──────────────────────────────────────────────
function fmt(s){
  s=Math.max(0,s);
  return String(Math.floor(s/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0');
}
function randCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ';
  return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');
}
function toast(msg,dur=2200){
  const el=$('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}
function connDot(s){
  $('conn-dot').classList.toggle('on',s==='on');
  $('conn-dot').classList.toggle('warn',s==='warn');
}

// ── Mode select ───────────────────────────────────────────
function goLocal(){
  gameMode='local';
  $('setup-subtitle').textContent='Tur-ur · Én telefon';
  $('setup-btns').innerHTML=`
    <button class="main-btn primary" onclick="startLocal()">START SPIL</button>
    <button class="main-btn secondary" onclick="showScreen('s-mode')">← Tilbage</button>`;
  showScreen('s-setup');
}
function goNetwork(){
  gameMode='network';
  $('setup-subtitle').textContent='Tur-ur · Netværk';
  $('setup-btns').innerHTML=`
    <button class="main-btn primary" onclick="hostGame()">OPRET SPIL</button>
    <button class="main-btn secondary" onclick="showJoin()">DELTAG I SPIL</button>
    <button class="main-btn secondary" style="font-size:.7rem;padding:.7rem;margin-top:.2rem;color:var(--ash)" onclick="showScreen('s-mode')">← Tilbage</button>`;
  showScreen('s-setup');
}

// ── Setup ────────────────────────────────────────────────
function setCnt(n){
  cfg.cnt=n;
  document.querySelectorAll('#cnt-btns .opt-btn').forEach(b=>b.classList.toggle('active',+b.dataset.n===n));
  renderNameInputs();
}
function setTime(m){
  cfg.secs=m*60;
  document.querySelectorAll('#time-btns .opt-btn').forEach(b=>b.classList.toggle('active',+b.dataset.m===m));
  $('custom-min').value='';
}
function setCustomTime(v){
  const m=parseInt(v);if(!m||m<1)return;
  cfg.secs=m*60;
  document.querySelectorAll('#time-btns .opt-btn').forEach(b=>b.classList.remove('active'));
}
function renderNameInputs(){
  const list=$('name-list');list.innerHTML='';
  for(let i=0;i<cfg.cnt;i++){
    const row=document.createElement('div');row.className='name-row';
    const dot=document.createElement('div');dot.className='name-dot';dot.style.background=COLORS[i];
    const inp=document.createElement('input');inp.type='text';inp.className='name-input';
    inp.id=`n-${i}`;inp.placeholder=DEF_NAMES[i];
    row.appendChild(dot);row.appendChild(inp);list.appendChild(row);
  }
}
function showSetup(){stopListening();showScreen('s-mode');}
function showJoin(){showScreen('s-join');}
setCnt(3);setTime(20);

// ── Local game ────────────────────────────────────────────
function startLocal(){
  const names=[];
  for(let i=0;i<cfg.cnt;i++){
    const v=$(`n-${i}`)?.value.trim();names.push(v||DEF_NAMES[i]);
  }
  // Build a local gs object (same shape as Firebase state)
  gs={
    cnt:cfg.cnt, secs:cfg.secs, names,
    timers:Array(cfg.cnt).fill(cfg.secs),
    active:-1, paused:false, phase:'playing'
  };
  me={code:null,idx:-1,isHost:true};
  localTimers=[...gs.timers];
  prevActive=-2;
  $('conn-dot').style.display='none';
  buildTiles(gs);
  showScreen('s-clock');
  updateAllTileUI(gs);
  $('bar-center').textContent='VÆLG SPILLER';
  $('pause-btn').textContent='⏸ PAUSE';
}

// ── Host ─────────────────────────────────────────────────
async function hostGame(){
  const names=[];
  for(let i=0;i<cfg.cnt;i++){
    const v=$(`n-${i}`)?.value.trim();names.push(v||DEF_NAMES[i]);
  }
  const code=randCode();
  me={code,idx:0,isHost:true};
  gameRef=db.ref(`games/${code}`);
  await gameRef.set({
    code,names,cnt:cfg.cnt,secs:cfg.secs,
    timers:Array(cfg.cnt).fill(cfg.secs),
    active:-1,paused:false,phase:'lobby',
    players:{0:{name:names[0],joined:true}}
  });
  $('lobby-code').textContent=code;
  showScreen('s-lobby');
  listenGame();
}

// ── Join ─────────────────────────────────────────────────
async function joinGame(){
  const code=$('join-code-input').value.trim().toUpperCase();
  if(code.length!==4){toast('Indtast 4 bogstaver');return;}
  gameRef=db.ref(`games/${code}`);
  const snap=await gameRef.once('value');
  if(!snap.exists()){toast('Spil ikke fundet');return;}
  const data=snap.val();
  if(data.phase!=='lobby'){toast('Spillet er allerede i gang');return;}
  const taken=Object.keys(data.players||{}).map(Number);
  let idx=-1;
  for(let i=0;i<data.cnt;i++){if(!taken.includes(i)){idx=i;break;}}
  if(idx<0){toast('Spillet er fuldt');return;}
  me={code,idx,isHost:false};
  await db.ref(`games/${code}/players`).update({[idx]:{name:data.names[idx],joined:true}});
  $('lobby-code').textContent=code;
  showScreen('s-lobby');
  listenGame();
}

// ── Listen ───────────────────────────────────────────────
function listenGame(){
  if(!gameRef)return;
  gameListener=gameRef.on('value',snap=>{
    if(!snap.exists())return;
    gs=snap.val();connDot('on');
    if(gs.phase==='lobby') renderLobby(gs);
    else if(gs.phase==='playing') renderClock(gs);
  },()=>connDot('warn'));
}
function stopListening(){
  if(gameRef&&gameListener){gameRef.off('value',gameListener);gameListener=null;}
  stopTick();gameRef=null;gs=null;prevActive=-2;
}

// ── Lobby ────────────────────────────────────────────────
function renderLobby(state){
  const list=$('lobby-players');list.innerHTML='';
  for(let i=0;i<state.cnt;i++){
    const joined=state.players?.[i];
    const pill=document.createElement('div');
    pill.className='player-pill'+(i===me.idx?' me':'');
    pill.innerHTML=`
      <div class="pill-dot" style="background:${COLORS[i]}"></div>
      <div class="pill-name" style="color:${joined?COLORS[i]:'var(--ash)'}">${state.names[i]}</div>
      ${joined?'<div class="pill-badge">TILSLUTTET</div>':'<div class="pill-badge" style="opacity:.4">VENTER</div>'}
      ${i===me.idx?'<div class="pill-badge" style="color:var(--gold)">DIG</div>':''}`;
    list.appendChild(pill);
  }
  const joined=Object.keys(state.players||{}).length;
  const btn=$('lobby-start-btn');
  btn.style.display=me.isHost?'block':'none';
  btn.disabled=joined<state.cnt;
  btn.textContent=joined<state.cnt?`VENTER (${joined}/${state.cnt})`:'START SPILLET';
}
async function launchGame(){
  if(!me.isHost||!gameRef)return;
  await gameRef.update({phase:'playing',active:-1,paused:false});
}
function leaveGame(){stopListening();showScreen('s-mode');}

// ── Clock ────────────────────────────────────────────────
function renderClock(state){
  showScreen('s-clock');
  if(prevActive===-2) buildTiles(state);
  if(state.active!==prevActive||state.paused){
    stopTick();
    localTimers=[...state.timers];
    if(!state.paused&&state.active>=0&&state.timers[state.active]>0){
      lastTickMs=Date.now();startTick(state.active);
    }
  }
  prevActive=state.active;
  // Show/hide conn dot based on mode
  $('conn-dot').style.display = gameMode==='network' ? 'block' : 'none';

  $('pause-banner').classList.toggle('show',state.paused);
  $('pause-btn').classList.toggle('paused',state.paused);
  $('pause-btn').textContent=state.paused?'▶ FORTSÆT':'⏸ PAUSE';
  $('bar-center').textContent=state.active>=0?state.names[state.active].toUpperCase():'VÆLG SPILLER';
  updateAllTileUI(state);
}
function buildTiles(state){
  const c=$('tiles');c.innerHTML='';
  c.style.gridTemplateRows=`repeat(${state.cnt},1fr)`;
  for(let i=0;i<state.cnt;i++){
    const t=document.createElement('div');
    t.className='tile';t.id=`tile-${i}`;
    t.style.setProperty('--pc',COLORS[i]);
    t.onclick=()=>onTileClick(i);
    t.innerHTML=`
      <div class="my-ring"></div>
      <div class="tile-name">${state.names[i]}</div>
      <div class="tile-time" id="tt-${i}">${fmt(state.timers[i])}</div>
      <div class="tile-sub"  id="ts-${i}"></div>`;
    c.appendChild(t);
  }
}
function updateAllTileUI(state){
  for(let i=0;i<(state?.cnt||0);i++) updateTileUI(i,state);
}
function updateTileUI(i,state){
  const tile=$(`tile-${i}`);if(!tile)return;
  const t=localTimers[i]??state?.timers[i]??0;
  const isActive=state?.active===i&&!state?.paused;
  const isExpired=t<=0, isWarning=t>0&&t<=60, isMe=i===me.idx;
  tile.className='tile'+(isActive?' active':'')+(isExpired?' expired':'')
    +(isWarning&&!isExpired?' warning':'')+(isMe?' is-me':'');
  $(`tt-${i}`).textContent=fmt(t);
  const sub=$(`ts-${i}`);
  if(isExpired)             sub.textContent='tid udløbet';
  else if(isActive)         sub.textContent='aktiv — tryk for at afslutte tur';
  else if(state?.active<0)  sub.textContent='tryk for at starte';
  else                      sub.textContent= gameMode==='local' ? 'tryk for at skifte til denne' : (isMe?'tryk for at overtage turen':'');
}

// ── Tick ─────────────────────────────────────────────────
function startTick(idx){
  tickInterval=setInterval(()=>{
    if(!gs||gs.paused)return;
    const now=Date.now(),elapsed=(now-lastTickMs)/1000;
    lastTickMs=now;
    localTimers[idx]=Math.max(0,localTimers[idx]-elapsed);
    const el=$(`tt-${idx}`);if(el)el.textContent=fmt(localTimers[idx]);
    const tile=$(`tile-${idx}`);
    if(tile)tile.classList.toggle('warning',localTimers[idx]>0&&localTimers[idx]<=60);
    if(localTimers[idx]<=0){stopTick();expirePlayer(idx);}
  },200);
}
function stopTick(){clearInterval(tickInterval);tickInterval=null;}
async function expirePlayer(idx){
  if(!gs)return;
  let next=(idx+1)%gs.cnt,tries=0;
  while(localTimers[next]<=0&&tries<gs.cnt){next=(next+1)%gs.cnt;tries++;}
  const newTimers=[...localTimers];newTimers[idx]=0;
  if(tries>=gs.cnt){
    if(gameMode==='local'){
      gs.timers=newTimers;gs.active=-1;gs.phase='done';
    } else {
      await gameRef.update({timers:newTimers,active:-1,phase:'done'});
    }
    showOv('Spillet er slut','Alle spilleres tid er brugt.',[
      {label:'Ny runde',fn:()=>{hideOv();restartSame();}},
      {label:'Indstillinger',fn:()=>{stopListening();hideOv();showScreen('s-mode');}}
    ]);return;
  }
  if(gameMode==='local'){
    gs.timers=newTimers;gs.active=next;syncLocalClock();
  } else {
    await gameRef.update({timers:newTimers,active:next});
  }
}

// ── Tile click ────────────────────────────────────────────
async function onTileClick(i){
  if(!gs||gs.phase!=='playing')return;
  if(gs.paused){toast('Spillet er sat på pause');return;}
  if(gs.active===i){
    const next=nextAlive(i);if(next<0)return;
    if(gameMode==='local'){ gs.active=next;gs.timers=[...localTimers];syncLocalClock(); }
    else await gameRef.update({timers:localTimers,active:next});
    return;
  }
  if(localTimers[i]<=0)return;
  if(gameMode==='local'){ gs.active=i;gs.timers=[...localTimers];syncLocalClock(); }
  else await gameRef.update({timers:localTimers,active:i});
}
function nextAlive(from){
  let next=(from+1)%gs.cnt,tries=0;
  while(localTimers[next]<=0&&tries<gs.cnt){next=(next+1)%gs.cnt;tries++;}
  return tries>=gs.cnt?-1:next;
}

// ── Pause ─────────────────────────────────────────────────
async function doPause(){
  if(!gs||gs.phase!=='playing')return;
  const newPaused=!gs.paused;
  if(gameMode==='local'){
    gs.paused=newPaused;
    if(!newPaused) gs.timers=[...localTimers];
    syncLocalClock();
  } else {
    const updates={paused:newPaused};
    if(!newPaused)updates.timers=localTimers;
    await gameRef.update(updates);
  }
}

// ── Local sync (mirrors renderClock for local mode) ────────
function syncLocalClock(){
  renderClock(gs);
}

// ── Reset ──────────────────────────────────────────────────
function showResetOverlay(){
  showOv('Nyt spil?','',[
    {label:'Genstart med samme indstillinger',fn:()=>{hideOv();restartSame();}},
    {label:'Nye indstillinger',fn:()=>{stopListening();hideOv();showScreen('s-mode');}},
  ]);
}
async function restartSame(){
  if(!gs)return;
  const newTimers=Array(gs.cnt).fill(gs.secs);
  prevActive=-2;
  if(gameMode==='local'){
    gs.timers=newTimers;gs.active=-1;gs.paused=false;gs.phase='playing';
    localTimers=[...newTimers];
    buildTiles(gs);syncLocalClock();
  } else {
    if(!gameRef)return;
    await gameRef.update({timers:newTimers,active:-1,paused:false,phase:'playing'});
    buildTiles({...gs,timers:newTimers});
  }
}

// ── Overlay ────────────────────────────────────────────────
function showOv(title,msg,btns){
  $('ov-title').textContent=title;$('ov-msg').textContent=msg;
  const c=$('ov-btns');c.innerHTML='';
  btns.forEach((b,i)=>{
    const el=document.createElement('button');
    el.className='ov-btn'+(i===0?' primary':'');
    el.textContent=b.label;el.onclick=b.fn;c.appendChild(el);
  });
  $('overlay').classList.add('show');
}
function hideOv(){$('overlay').classList.remove('show');}

// Wake lock
(async()=>{try{if('wakeLock' in navigator)await navigator.wakeLock.request('screen');}catch{}})();
</script>
